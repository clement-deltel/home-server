  vars_files:
    - ../vars/main.yml

  tasks:
  - name: Initialize persistence directories and files
    tags: docker
    block:

    #--- Directories
    - name: Create persistence directories
      ignore_errors: true
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: docker
        group: docker
        mode: 0744
      loop: "{{ directories }}"

    #--- Files
    - name: Create traefik log files
      ansible.builtin.file:
        path: "{{ item }}"
        state: touch
        owner: docker
        group: docker
        mode: 0640
      loop:
        - "{{ server_home }}/services/traefik/persistence/log/access.log"
        - "{{ server_home }}/services/traefik/persistence/log/traefik.log"

    #--- Traefik - Testing
    - name: Traefik Testing - Copy Traefik configuration file
      when: local_domain
      ansible.builtin.copy:
        src: "{{ server_home }}/services/traefik/config_local/traefik.yaml"
        dest: "{{ server_home }}/services/traefik/persistence/traefik.yaml"
        owner: docker
        group: docker
        mode: 0640

    #--- Traefik - Production
    - name: Traefik Production
      when: not local_domain
      block:

      - name: Create traefik certificates file
        ansible.builtin.file:
          path: "{{ server_home }}/services/traefik/persistence/acme.json"
          state: touch
          owner: docker
          group: docker
          mode: 0600

      - name: Copy Traefik static configuration file
        ansible.builtin.copy:
          src: "{{ server_home }}/services/traefik/config/traefik.yaml"
          dest: "{{ server_home }}/services/traefik/persistence/traefik.yaml"
          owner: docker
          group: docker
          mode: 0640

      - name: Add email to traefik.yaml
        ansible.builtin.lineinfile:
          path: "{{ server_home }}/services/traefik/persistence/traefik.yaml"
          state: present
          search_string: 'email: ""'
          line: '  email: "{{ user_email }}"'

      - name: Copy Traefik dynamic configuration file
        ansible.builtin.copy:
          src: "{{ server_home }}/services/traefik/config/dynamic.yaml"
          dest: "{{ server_home }}/services/traefik/persistence/dynamic/dynamic.yaml"
          owner: docker
          group: docker
          mode: 0640

      - name: Add CrowdSec API key to dynamic.yaml
        ansible.builtin.lineinfile:
          path: "{{ server_home }}/services/traefik/persistence/dynamic/dynamic.yaml"
          state: present
          search_string: 'crowdsecLapiKey: ""'
          line: '          crowdsecLapiKey: "{{ crowdsec_api_key }}"'

      - name: Create traefik users.txt file
        ansible.builtin.file:
          path: "{{ server_home }}/services/traefik/persistence/users.txt"
          state: touch
          owner: docker
          group: docker
          mode: 0640

      - name: Add a user to users.txt
        community.general.htpasswd:
          path: "{{ server_home }}/services/traefik/persistence/users.txt"
          name: "{{ traefik_user }}"
          password: "{{ traefik_password }}"
          hash_scheme: md5_crypt
          state: present

    #--- Production Services
    - name: Production - Uncomment labels and bind mounts in compose.yaml for all services
      when: not local_domain
      ansible.builtin.replace:
        path: "{{ item }}"
        regexp: '(^\s*)# -'
        replace: '\1-'
      loop:
        - "{{ server_home }}/services/ai/hermes/compose.yaml"
        - "{{ server_home }}/services/ai/honcho/compose.yaml"
        - "{{ server_home }}/services/ai/langfuse/compose.yaml"
        - "{{ server_home }}/services/ai/litellm/compose.yaml"
        - "{{ server_home }}/services/ai/open-notebook/compose.yaml"
        - "{{ server_home }}/services/ai/open-webui/compose.yaml"
        - "{{ server_home }}/services/ai/openconcho/compose.yaml"
        - "{{ server_home }}/services/automation/n8n/compose.yaml"
        - "{{ server_home }}/services/dashboard/homarr/compose.yaml"
        - "{{ server_home }}/services/dashboard/homer/compose.yaml"
        - "{{ server_home }}/services/development/directus/compose.yaml"
        - "{{ server_home }}/services/dns/pihole/compose.yaml"
        - "{{ server_home }}/services/finances/actual/compose.yaml"
        - "{{ server_home }}/services/finances/wallos/compose.yaml"
        - "{{ server_home }}/services/games/romm/compose.yaml"
        - "{{ server_home }}/services/home/home-assistant/compose.yaml"
        - "{{ server_home }}/services/home/upsnap/compose.yaml"
        - "{{ server_home }}/services/inventory/grocy/compose.yaml"
        - "{{ server_home }}/services/inventory/homebox/compose.yaml"
        - "{{ server_home }}/services/inventory/hortusfox/compose.yaml"
        - "{{ server_home }}/services/inventory/mealie/compose.yaml"
        - "{{ server_home }}/services/inventory/wishlist/compose.yaml"
