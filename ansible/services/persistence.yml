        - "{{ server_home }}/services/media/tools/bento-pdf/compose.yaml"
        - "{{ server_home }}/services/media/tools/stirling-pdf/compose.yaml"
        - "{{ server_home }}/services/monitoring/change-detection/compose.yaml"
        # no labels for monitoring/diun
        - "{{ server_home }}/services/monitoring/dozzle/compose.yaml"
        - "{{ server_home }}/services/monitoring/grafana/compose.yaml"
        - "{{ server_home }}/services/monitoring/ntfy/compose.yaml"
