        - "{{ server_home }}/services/travel/dawarich/compose.yaml"
        - "{{ server_home }}/services/travel/jetlog/compose.yaml"

    #--- Diun
    - name: Copy Diun file input
      ansible.builtin.copy:
        src: "{{ server_home }}/services/monitoring/diun/config/images.yaml"
        dest: "/opt/persistence/diun/config/images.yaml"
        owner: docker
        group: docker
        mode: 0640

    #--- Guacamole
    - name: Make initdb.sql script executable
      ansible.builtin.file:
        path: "{{ server_home }}/services/remote/guacamole/config/initdb.sql"
        state: file
        owner: docker
        group: docker
        mode: 0777

    #--- Ntfy
    - name: Copy Ntfy server configuration file
      ansible.builtin.copy:
        src: "{{ server_home }}/services/monitoring/ntfy/config/server.yml"
        dest: "{{ server_home }}/services/monitoring/ntfy/persistence/etc/server.yml"
        owner: docker
        group: docker
        mode: 0640

    #--- Pihole
    - name: Create Pihole log file
      ansible.builtin.file:
        path: "{{ server_home }}/services/dns/pihole/pihole.log"
        state: touch
        owner: docker
        group: docker
        mode: 0640

    #--- Stirling PDF
    - name: Download French language pack for OCR feature
      ansible.builtin.get_url:
        url: https://github.com/tesseract-ocr/tessdata/blob/main/fra.traineddata
        dest: "{{ server_home }}/services/media/tools/stirling-pdf/persistence/tessdata/fra.traineddata"
        mode: 0740

    #--- Unbound
    - name: Copy Unbound server configuration files
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dst }}"
        owner: docker
        group: docker
        mode: 0640
      loop:
        - { src: "{{ server_home }}/services/dns/unbound/config/forward-records.conf", dst: "{{ server_home }}/services/dns/unbound/persistence/forward-records.conf" }
        - { src: "{{ server_home }}/services/dns/unbound/config/unbound.conf", dst: "{{ server_home }}/services/dns/unbound/persistence/unbound.conf" }
