  vars_files:
    - ../vars/main.yml

  tasks:
  - name: Initialize persistence directories and files
    tags: docker
    block:

    #--- Directories
    - name: Create persistence directories
      ignore_errors: true
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: docker
        group: docker
        mode: 0744
      loop: "{{ directories }}"

    #--- Files
    - name: Create traefik log files
      ansible.builtin.file:
        path: "{{ item }}"
        state: touch
        owner: docker
        group: docker
        mode: 0640
      loop:
        - "{{ server_home }}/services/traefik/persistence/log/access.log"
        - "{{ server_home }}/services/traefik/persistence/log/traefik.log"

    #--- Traefik - Testing
    - name: Traefik Testing - Copy Traefik configuration file
      when: local_domain
      ansible.builtin.copy:
        src: "{{ server_home }}/services/traefik/config_local/traefik.yaml"
        dest: "{{ server_home }}/services/traefik/persistence/traefik.yaml"
        owner: docker
        group: docker
        mode: 0640

    #--- Traefik - Production
    - name: Traefik Production
      when: not local_domain
      block:

      - name: Create traefik certificates file
        ansible.builtin.file:
          path: "{{ server_home }}/services/traefik/persistence/acme.json"
          state: touch
          owner: docker
          group: docker
          mode: 0600

      - name: Copy Traefik static configuration file
        ansible.builtin.copy:
          src: "{{ server_home }}/services/traefik/config/traefik.yaml"
          dest: "{{ server_home }}/services/traefik/persistence/traefik.yaml"
          owner: docker
          group: docker
          mode: 0640

      - name: Add email to traefik.yaml
        ansible.builtin.lineinfile:
          path: "{{ server_home }}/services/traefik/persistence/traefik.yaml"
          state: present
          search_string: 'email: ""'
          line: '  email: "{{ user_email }}"'

      - name: Copy Traefik dynamic configuration file
        ansible.builtin.copy:
          src: "{{ server_home }}/services/traefik/config/dynamic.yaml"
          dest: "{{ server_home }}/services/traefik/persistence/dynamic/dynamic.yaml"
          owner: docker
          group: docker
          mode: 0640

      - name: Add CrowdSec API key to dynamic.yaml
        ansible.builtin.lineinfile:
          path: "{{ server_home }}/services/traefik/persistence/dynamic/dynamic.yaml"
          state: present
          search_string: 'crowdsecLapiKey: ""'
          line: '          crowdsecLapiKey: "{{ crowdsec_api_key }}"'

      - name: Create traefik users.txt file
        ansible.builtin.file:
          path: "{{ server_home }}/services/traefik/persistence/users.txt"
          state: touch
          owner: docker
          group: docker
          mode: 0640

      - name: Add a user to users.txt
        community.general.htpasswd:
          path: "{{ server_home }}/services/traefik/persistence/users.txt"
          name: "{{ traefik_user }}"
          password: "{{ traefik_password }}"
          hash_scheme: md5_crypt
          state: present

    #--- Production Services
    - name: Production - Uncomment labels and bind mounts in compose.yaml for all services
      when: not local_domain
      ansible.builtin.replace:
        path: "{{ item }}"
        regexp: '(^\s*)# -'
        replace: '\1-'
      loop:
        - "{{ server_home }}/services/ai/litellm/compose.yaml"
        - "{{ server_home }}/services/ai/open-webui/compose.yaml"
        - "{{ server_home }}/services/dashboard/homarr/compose.yaml"
        - "{{ server_home }}/services/dashboard/homer/compose.yaml"
        - "{{ server_home }}/services/dns/pihole/compose.yaml"
        - "{{ server_home }}/services/finances/actual/compose.yaml"
        - "{{ server_home }}/services/finances/wallos/compose.yaml"
        - "{{ server_home }}/services/games/romm/compose.yaml"
        - "{{ server_home }}/services/home/home-assistant/compose.yaml"
        - "{{ server_home }}/services/home/upsnap/compose.yaml"
        - "{{ server_home }}/services/inventory/grocy/compose.yaml"
        - "{{ server_home }}/services/inventory/homebox/compose.yaml"
        - "{{ server_home }}/services/inventory/hortusfox/compose.yaml"
        - "{{ server_home }}/services/inventory/mealie/compose.yaml"
        - "{{ server_home }}/services/inventory/wishlist/compose.yaml"
        - "{{ server_home }}/services/kopia/compose.yaml"
        - "{{ server_home }}/services/management/code/bytestash/compose.yaml"
        - "{{ server_home }}/services/management/code/forgejo/compose.yaml"
        - "{{ server_home }}/services/management/code/gitea-mirror/compose.yaml"
        - "{{ server_home }}/services/management/code/gitlab/compose.yaml"
        - "{{ server_home }}/services/management/code/it-tools/compose.yaml"
        - "{{ server_home }}/services/management/passwords/vaultwarden/compose.yaml"
        - "{{ server_home }}/services/media/sharing/gokapi/compose.yaml"
        - "{{ server_home }}/services/media/storage/bookmarks/karakeep/compose.yaml"
        - "{{ server_home }}/services/media/storage/books/kavita/compose.yaml"
        - "{{ server_home }}/services/media/storage/documents/nextcloud/compose.yaml"
        - "{{ server_home }}/services/media/storage/documents/paperless/compose.yaml"
        - "{{ server_home }}/services/media/storage/music/navidrome/compose.yaml"
        - "{{ server_home }}/services/media/storage/news/freshrss/compose.yaml"
        - "{{ server_home }}/services/media/storage/pictures/immich/compose.yaml"
        - "{{ server_home }}/services/media/storage/pictures/meme-search/compose.yaml"
        - "{{ server_home }}/services/media/storage/pictures/photoprism/compose.yaml"
        - "{{ server_home }}/services/media/storage/pictures/pinry/compose.yaml"
        - "{{ server_home }}/services/media/storage/videos/jellyfin/compose.yaml"
        - "{{ server_home }}/services/media/tools/convertx/compose.yaml"
        - "{{ server_home }}/services/media/tools/docuseal/compose.yaml"
        - "{{ server_home }}/services/media/tools/stirling-pdf/compose.yaml"
        - "{{ server_home }}/services/monitoring/change-detection/compose.yaml"
        - "{{ server_home }}/services/monitoring/grafana/compose.yaml"
        - "{{ server_home }}/services/monitoring/ntfy/compose.yaml"
        - "{{ server_home }}/services/monitoring/scrutiny/compose.yaml"
        - "{{ server_home }}/services/other/directus/compose.yaml"
        - "{{ server_home }}/services/other/limesurvey/compose.yaml"
        - "{{ server_home }}/services/pkms/affine/compose.yaml"
        - "{{ server_home }}/services/pkms/mathesar/compose.yaml"
        - "{{ server_home }}/services/pkms/memos/compose.yaml"
        - "{{ server_home }}/services/pkms/obsidian/compose.yaml"
        - "{{ server_home }}/services/proxy/traefik/compose.yaml"
        - "{{ server_home }}/services/remote/guacamole/compose.yaml"
        - "{{ server_home }}/services/remote/rustdesk/compose.yaml"
        - "{{ server_home }}/services/remote/wg-easy/compose.yaml"
        - "{{ server_home }}/services/search/searngx/compose.yaml"
        - "{{ server_home }}/services/security/authentik/compose.yaml"
        # no labels for security/crowdsec
        - "{{ server_home }}/services/security/enclosed/compose.yaml"
        - "{{ server_home }}/services/security/gluetun/compose.yaml"
        - "{{ server_home }}/services/security/wazuh/compose.yaml"
        - "{{ server_home }}/services/travel/adventurelog/compose.yaml"
        - "{{ server_home }}/services/travel/dawarich/compose.yaml"
        - "{{ server_home }}/services/travel/jetlog/compose.yaml"

    #--- Guacamole
