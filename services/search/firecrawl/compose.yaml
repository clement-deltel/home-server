# https://github.com/firecrawl/firecrawl
services:
  broker:
    command: rabbitmq-server
    container_name: firecrawl-rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 20s
      timeout: 15s
      retries: 3
      start_period: 60s
      start_interval: 5s
    hostname: firecrawl-rabbitmq
    image: ${DEFAULT_BROKER_IMAGE}
    logging:
      driver: json-file
      options:
        max-file: 2
        max-size: 2m
    networks:
      internal-net:
        ipv4_address: ${FIRECRAWL_BROKER_IP}
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - /opt/persistence/firecrawl/broker:/var/lib/rabbitmq

  cache:
    container_name: firecrawl-valkey
    environment:
      - VALKEY_EXTRA_FLAGS=--bind 0.0.0.0 --requirepass ${FIRECRAWL_CACHE_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli --raw INCR PING"]
      interval: 20s
      retries: 3
      start_period: 60s
      start_interval: 5s
      timeout: 15s
    hostname: firecrawl-valkey
    image: ${DEFAULT_CACHE_IMAGE}
    logging:
      driver: json-file
      options:
        max-file: 2
        max-size: 2m
    networks:
      internal-net:
        ipv4_address: ${FIRECRAWL_CACHE_IP}
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - /mnt/ssd/cache/firecrawl:/data

  db:
    container_name: firecrawl-postgres
    env_file: config/.env.db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FIRECRAWL_DB_USERNAME}"]
      interval: 20s
      retries: 3
      start_period: 60s
      start_interval: 5s
      timeout: 15s
    hostname: firecrawl-postgres
    image: ${FIRECRAWL_DB_IMAGE}
    logging:
      driver: json-file
      options:
        max-file: 2
        max-size: 5m
    networks:
      internal-net:
        ipv4_address: ${FIRECRAWL_DB_IP}
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - /mnt/ssd/databases/firecrawl:/var/lib/postgresql/data

  foundationdb:
    container_name: firecrawl-fdb
    env_file: config/.env.fdb
    healthcheck:
      test: ["CMD-SHELL", "fdbcli -C /var/fdb/fdb.cluster --exec status || exit 1"]
      interval: 20s
      timeout: 15s
      retries: 3
      start_period: 60s
      start_interval: 5s
    hostname: firecrawl-fdb
    image: ${FOUNDATION_DB_IMAGE}
    logging:
      driver: json-file
      options:
        max-file: 2
        max-size: 5m
    networks:
      internal-net:
        ipv4_address: ${FIRECRAWL_FDB_IP}
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - /opt/persistence/firecrawl/fdb-cluster:/var/fdb
      - /opt/persistence/firecrawl/fdb-data:/var/fdb/data

  foundationdb-init:
    container_name: firecrawl-fdb-init
    depends_on:
      foundationdb:
        condition: service_started
    entrypoint:
      - /bin/bash
      - -c
      - "sleep 5 && out=$(fdbcli -C /var/fdb/fdb.cluster --exec 'configure new single ssd' 2>&1); status=$$?; printf '%s\n' \"$$out\"; if [ \"$$status\" -eq 0 ]; then exit 0; fi; printf '%s\n' \"$$out\" | grep -Eiq 'already.*configured|database.*configured'"
    hostname: firecrawl-fdb-init
    image: ${DEFAULT_FDB_IMAGE}
    logging:
      driver: json-file
      options:
        max-file: 2
        max-size: 5m
    networks:
      internal-net:
        ipv4_address: ${FIRECRAWL_FDB_INIT_IP}
    restart: "no"
    stop_grace_period: 30s
    volumes:
      - /opt/persistence/firecrawl/fdb-cluster:/var/fdb

  playwright:
    command: null
    container_name: firecrawl-playwright
    deploy:
      resources:
        limits:
          cpus: 2
          memory: 4G
    env_file: config/.env.playwright
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 20s
      timeout: 15s
      retries: 3
      start_period: 60s
      start_interval: 5s
    hostname: firecrawl-playwright
    image: ${FIRECRAWL_PLAYWRIGHT_IMAGE}
    logging:
      driver: json-file
      options:
        max-file: 5
        max-size: 10m
    memswap_limit: 4G
    networks:
      internal-net:
        ipv4_address: ${FIRECRAWL_PLAYWRIGHT_IP}
    restart: unless-stopped
    stop_grace_period: 30s
    tmpfs:
      - /tmp/.cache:noexec,nosuid,size=1g

  api:
    command: node dist/src/harness.js --start-docker
    container_name: firecrawl-api
    depends_on:
      broker:
        condition: service_healthy
      cache:
        condition: service_healthy
      db:
        condition: service_healthy
      foundationdb:
        condition: service_healthy
      playwright:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: 4
          memory: 8G
    dns:
      - 127.0.0.1
      - ${DNS_SERVER_1}
      - ${DNS_SERVER_2}
    env_file: config/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/ || exit 1"]
      interval: 20s
      timeout: 15s
      retries: 3
      start_period: 60s
      start_interval: 5s
    hostname: firecrawl-api
    image: ${FIRECRAWL_API_IMAGE}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.firecrawl.entrypoints=web,websecure"
      - "traefik.http.routers.firecrawl.rule=Host(`${FIRECRAWL_HOST}`)"
      - "traefik.http.routers.firecrawl.tls=true"
      # - "traefik.http.routers.firecrawl.tls.certresolver=letsencrypt"
      # - "traefik.http.routers.firecrawl.tls.domains[0].main=${FIRECRAWL_HOST}"
      - "traefik.http.routers.firecrawl.service=firecrawl"
      - "traefik.http.services.firecrawl.loadbalancer.server.port=3002"
    logging:
      driver: json-file
      options:
        max-file: 5
        max-size: 10m
    memswap_limit: 8G
    networks:
      internal-net:
        ipv4_address: ${FIRECRAWL_INTERNAL_IP}
      proxy-net:
        ipv4_address: ${FIRECRAWL_IP}
      ai-net:
        ipv4_address: ${FIRECRAWL_AI_IP}
    ports:
      - 3002
    restart: unless-stopped
    stop_grace_period: 30s
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    volumes:
      - /opt/persistence/firecrawl/fdb-cluster:/var/fdb:ro

networks:
  internal-net:
    name: internal-firecrawl
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: ${FIRECRAWL_NET}
          gateway: ${FIRECRAWL_GATEWAY}
  proxy-net:
    external: true
    name: traefik-net
  ai-net:
    external: true
    name: ai-net
