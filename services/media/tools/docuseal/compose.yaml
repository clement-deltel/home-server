# https://github.com/docusealco/docuseal
services:
  db:
    container_name: docuseal-postgres
    env_file: config/.env.db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DOCUSEAL_DB_USER}"]
      interval: 20s
      timeout: 15s
      retries: 3
      start_period: 60s
      start_interval: 5s
    hostname: docuseal-postgres
    image: ${DEFAULT_POSTGRES_IMAGE}
    logging:
      driver: json-file
      options:
        max-file: 2
        max-size: 5m
    networks:
      internal-net:
        ipv4_address: ${DOCUSEAL_DB_IP}
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - /mnt/ssd/databases/docuseal:/var/lib/postgresql/data

  docuseal:
    container_name: docuseal
    depends_on:
      db:
        condition: service_healthy
    dns:
      - 127.0.0.1
      - ${DNS_SERVER_1}
      - ${DNS_SERVER_2}
    env_file: config/.env
    hostname: docuseal
    image: ${DOCUSEAL_IMAGE}
    labels:
      - "traefik.enable=true"
      # Routers
      - "traefik.http.routers.docuseal.entrypoints=web,websecure"
      - "traefik.http.routers.docuseal.rule=Host(`${DOCUSEAL_HOST}`)"
      - "traefik.http.routers.docuseal.tls=true"
      # - "traefik.http.routers.docuseal.tls.certresolver=letsencrypt"
      # - "traefik.http.routers.docuseal.tls.domains[0].main=${DOCUSEAL_HOST}"
      - "traefik.http.routers.docuseal.service=docuseal"
      # Services
      - "traefik.http.services.docuseal.loadbalancer.server.port=3000"
    logging:
      driver: json-file
      options:
        max-file: 5
        max-size: 10m
    networks:
      internal-net:
        ipv4_address: ${DOCUSEAL_INTERNAL_IP}
      proxy-net:
        ipv4_address: ${DOCUSEAL_IP}
    ports:
      - 3000
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - ./persistence:/data

networks:
  internal-net:
    name: internal-docuseal
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: ${DOCUSEAL_NET}
          gateway: ${DOCUSEAL_GATEWAY}
  proxy-net:
    external: true
    name: traefik-net
