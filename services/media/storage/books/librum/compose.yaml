# https://github.com/Librum-Reader/Librum
services:
  db:
    container_name: librum-mariadb
    env_file: config/.env.db
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p${LIBRUM_DB_ROOT_PASSWORD}"]
      interval: 20s
      timeout: 15s
      retries: 3
      start_period: 60s
      start_interval: 5s
    hostname: librum-mariadb
    image: ${DEFAULT_DB_IMAGE}
    logging:
      driver: json-file
      options:
        max-file: 2
        max-size: 5m
    networks:
      internal-net:
        ipv4_address: ${LIBRUM_DB_IP}
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - /mnt/ssd/databases/librum:/var/lib/mysql

  librum:
    container_name: librum
    depends_on:
      db:
        condition: service_healthy # Ensures the DB is up before the server.
    dns:
      - 127.0.0.1
      - ${DNS_SERVER_1}
      - ${DNS_SERVER_2}
    env_file: config/.env
    hostname: librum
    image: ${LIBRUM_IMAGE}
    labels:
      - "traefik.enable=true"
      # Routers
      - "traefik.http.routers.librum.entrypoints=web,websecure"
      - "traefik.http.routers.librum.rule=Host(`${LIBRUM_HOST}`)"
      - "traefik.http.routers.librum.tls=true"
      # - "traefik.http.routers.librum.tls.certresolver=letsencrypt"
      # - "traefik.http.routers.librum.tls.domains[0].main=${LIBRUM_HOST}"
      - "traefik.http.routers.librum.service=librum"
      # Services
      - "traefik.http.services.librum.loadbalancer.server.port=5000"
    logging:
      driver: json-file
      options:
        max-file: 5
        max-size: 10m
    networks:
      internal-net:
        ipv4_address: ${LIBRUM_INTERNAL_IP}
      proxy-net:
        ipv4_address: ${LIBRUM_IP}
    ports:
      - 5000
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      # permissions for this directory: 999:999
      - ./persistence:/var/lib/librum-server/librum_storage

networks:
  internal-net:
    name: internal-librum
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: ${LIBRUM_NET}
          gateway: ${LIBRUM_GATEWAY}
  proxy-net:
    external: true
    name: traefik-net
