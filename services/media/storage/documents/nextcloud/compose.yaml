# https://github.com/nextcloud/server
services:
  cache:
    container_name: nextcloud-valkey
    environment:
      - VALKEY_EXTRA_FLAGS=--requirepass ${NEXTCLOUD_CACHE_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli --raw INCR PING"]
      interval: 20s
      timeout: 15s
      retries: 3
      start_period: 60s
      start_interval: 5s
    hostname: nextcloud-valkey
    image: ${DEFAULT_CACHE_IMAGE}
    logging:
      driver: json-file
      options:
        max-file: 2
        max-size: 2m
    networks:
      internal-net:
        ipv4_address: ${NEXTCLOUD_CACHE_IP}
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - /mnt/ssd/cache/nextcloud:/data

  db:
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    container_name: nextcloud-mariadb
    env_file: config/.env.db
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p${NEXTCLOUD_DB_ROOT_PASSWORD}"]
      interval: 20s
      timeout: 15s
      retries: 3
      start_period: 60s
      start_interval: 5s
    hostname: nextcloud-mariadb
    image: ${DEFAULT_DB_IMAGE}
    logging:
      driver: json-file
      options:
        max-file: 2
        max-size: 5m
    networks:
      internal-net:
        ipv4_address: ${NEXTCLOUD_DB_IP}
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      # Permissions for this folder:
      - /mnt/ssd/databases/nextcloud:/var/lib/mysql
      - /etc/localtime:/etc/localtime:ro

  cron:
    container_name: nextcloud-cron
    depends_on:
      cache:
        condition: service_healthy
      db:
        condition: service_healthy
    entrypoint: /cron.sh
    hostname: nextcloud-cron
    image: ${NEXTCLOUD_IMAGE}
    logging:
      driver: json-file
      options:
        max-file: 2
        max-size: 2m
    networks:
      internal-net:
        ipv4_address: ${NEXTCLOUD_CRON_IP}
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - ./persistence:/var/www/html

  app:
    container_name: nextcloud
    depends_on:
      cache:
        condition: service_healthy
      db:
        condition: service_healthy
    env_file: config/.env
    hostname: nextcloud
    image: ${NEXTCLOUD_IMAGE}
    logging:
      driver: json-file
      options:
        max-file: 5
        max-size: 10m
    networks:
      internal-net:
        ipv4_address: ${NEXTCLOUD_INTERNAL_IP}
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - ./persistence:/var/www/html

  nextcloud:
    container_name: nextcloud-web
    depends_on:
      app:
        condition: service_started
      cache:
        condition: service_healthy
      db:
        condition: service_healthy
    dns:
      - 127.0.0.1
      - ${DNS_SERVER_1}
      - ${DNS_SERVER_2}
    hostname: nextcloud-web
    image: ${FASTCGI_SUPPORT_IMAGE}
    labels:
      - "traefik.enable=true"
      # Routers
      - "traefik.http.routers.nextcloud.entrypoints=web,websecure"
      - "traefik.http.routers.nextcloud.rule=Host(`${NEXTCLOUD_HOST}`)"
      - "traefik.http.routers.nextcloud.tls=true"
      # - "traefik.http.routers.nextcloud.tls.certresolver=letsencrypt"
      # - "traefik.http.routers.nextcloud.tls.domains[0].main=${NEXTCLOUD_HOST}"
      - "traefik.http.routers.nextcloud.service=nextcloud"
      # Services
      - "traefik.http.services.nextcloud.loadbalancer.server.port=80"
    links:
      - app
    logging:
      driver: json-file
      options:
        max-file: 2
        max-size: 2m
    networks:
      internal-net:
        ipv4_address: ${NEXTCLOUD_WEB_IP}
      proxy-net:
        ipv4_address: ${NEXTCLOUD_IP}
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - ./web-persistence/Caddyfile:/etc/caddy/Caddyfile
      - ./web-persistence/data:/data
      - ./web-persistence/config:/config
    volumes_from:
      - app

networks:
  internal-net:
    name: internal-nextcloud
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: ${NEXTCLOUD_NET}
          gateway: ${NEXTCLOUD_GATEWAY}
  proxy-net:
    external: true
    name: traefik-net
