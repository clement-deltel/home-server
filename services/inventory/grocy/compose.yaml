# https://github.com/grocy/grocy
services:
  grocy:
    container_name: grocy
    dns:
      - 127.0.0.1
      - ${DNS_SERVER_1}
      - ${DNS_SERVER_2}
    env_file: config/.env
    hostname: grocy
    image: ${GROCY_IMAGE}
    labels:
      - "traefik.enable=true"
      # Routers
      - "traefik.http.routers.grocy.entrypoints=web,websecure"
      - "traefik.http.routers.grocy.rule=Host(`${GROCY_HOST}`)"
      - "traefik.http.routers.grocy.tls=true"
      # - "traefik.http.routers.grocy.tls.certresolver=letsencrypt"
      # - "traefik.http.routers.grocy.tls.domains[0].main=${GROCY_HOST}"
      - "traefik.http.routers.grocy.service=grocy"
      # Services
      - "traefik.http.services.grocy.loadbalancer.server.port=80"
    logging:
      driver: json-file
      options:
        max-file: 5
        max-size: 10m
    networks:
      proxy-net:
        ipv4_address: ${GROCY_IP}
    ports:
      - 80
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - /opt/persistence/grocy:/config

networks:
  proxy-net:
    external: true
    name: traefik-net
