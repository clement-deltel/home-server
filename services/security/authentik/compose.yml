# https://github.com/goauthentik/authentik
services:
  db:
    container_name: authentik-postgres
    env_file: config/.env.db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTHENTIK_DB_USER}"]
      interval: 20s
      timeout: 15s
      retries: 3
      start_period: 60s
      start_interval: 5s
    hostname: authentik-postgres
    # docker.io/library/postgres:16-alpine
    image: ${DEFAULT_POSTGRES_IMAGE}
    logging:
      driver: json-file
      options:
        max-file: 2
        max-size: 5m
    networks:
      internal-net:
        ipv4_address: ${AUTHENTIK_DB_IP}
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - ./db-persistence:/var/lib/postgresql/data

  authentik_worker:
    command: worker
    container_name: authentik-worker
    depends_on:
      db:
        condition: service_healthy
    env_file: config/.env
    hostname: authentik-worker
    image: ${AUTHENTIK_SERVER_IMAGE}
    logging:
      driver: json-file
      options:
        max-file: 2
        max-size: 5m
    networks:
      internal-net:
        ipv4_address: ${AUTHENTIK_WORKER_IP}
    restart: unless-stopped
    stop_grace_period: 30s
    user: root
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - ./persistence/certs:/certs
    - ./persistence/custom-templates:/templates
    - ./persistence/data:/data

  authentik_server:
    command: server
    container_name: authentik-server
    depends_on:
      db:
        condition: service_healthy
    dns:
      - 127.0.0.1
      - ${DNS_SERVER_1}
      - ${DNS_SERVER_2}
    env_file: config/.env
    hostname: authentik-server
    image: ${AUTHENTIK_SERVER_IMAGE}
    labels:
      - "traefik.enable=true"
      # Routers
      # - "traefik.http.routers.authentik.entrypoints=web,websecure"
      - "traefik.http.routers.authentik.rule=Host(`auth.${DOMAIN}`)"
      # - "traefik.http.routers.authentik.tls=true"
      # - "traefik.http.routers.authentik.tls.certresolver=letsencrypt"
      # - "traefik.http.routers.authentik.tls.domains[0].main=auth.${DOMAIN}"
      - "traefik.http.routers.authentik.service=authentik"
      # Services
      - "traefik.http.services.authentik.loadbalancer.server.port=9300"
    logging:
      driver: json-file
      options:
        max-file: 5
        max-size: 10m
    networks:
      internal-net:
        ipv4_address: ${AUTHENTIK_INTERNAL_IP}
      monitoring-net:
        ipv4_address: ${AUTHENTIK_MONITORING_IP}
      proxy-net:
        ipv4_address: ${AUTHENTIK_IP}
    ports:
    - 9000
    - 9300
    - 9443
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
    - ./persistence/data:/data
    - ./persistence/custom-templates:/templates

networks:
  internal-net:
    name: internal-authentik
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: ${AUTHENTIK_NET}
          gateway: ${AUTHENTIK_GATEWAY}
  monitoring-net:
    external: true
    name: monitoring-net
  proxy-net:
    external: true
    name: traefik-net
