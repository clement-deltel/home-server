  honcho:
    container_name: honcho
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    dns:
      - 127.0.0.1
      - ${DNS_SERVER_1}
      - ${DNS_SERVER_2}
    env_file: config/.env
    healthcheck:
      test:
        [
          "CMD",
          "/app/.venv/bin/python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    hostname: honcho
    image: ${HONCHO_IMAGE}
    labels:
      - "traefik.enable=true"
      # Routers
      - "traefik.http.routers.honcho.entrypoints=web-external,websecure-external"
      - "traefik.http.routers.honcho.rule=Host(`${HONCHO_HOST}`)"
      - "traefik.http.routers.honcho.tls=true"
      # - "traefik.http.routers.honcho.tls.certresolver=letsencrypt"
      # - "traefik.http.routers.honcho.tls.domains[0].main=${HONCHO_HOST}"
      - "traefik.http.routers.honcho.service=honcho"
      # Services
      - "traefik.http.services.honcho.loadbalancer.server.port=8000"
    logging:
      driver: json-file
      options:
        max-file: 5
        max-size: 10m
    networks:
      internal-net:
        ipv4_address: ${HONCHO_INTERNAL_IP}
      proxy-net:
        ipv4_address: ${HONCHO_IP}
      ai-net:
        ipv4_address: ${HONCHO_AI_IP}
    ports:
      - 8000
    restart: unless-stopped
    stop_grace_period: 30s

networks:
  internal-net:
    name: internal-honcho
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: ${HONCHO_NET}
          gateway: ${HONCHO_GATEWAY}
  proxy-net:
    external: true
    name: traefik-net
  ai-net:
    external: true
    name: ai-net
