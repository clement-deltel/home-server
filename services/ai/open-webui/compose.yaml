services:
  open-webui:
    container_name: open-webui
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    dns:
      - 127.0.0.1
      - ${DNS_SERVER_1}
      - ${DNS_SERVER_2}
    env_file: config/.env
    hostname: open-webui
    image: ${OPEN_WEBUI_IMAGE}
    labels:
      - "traefik.enable=true"
      # Routers
      - "traefik.http.routers.open-webui.entrypoints=web,websecure"
      - "traefik.http.routers.open-webui.rule=Host(`${OPEN_WEBUI_HOST}`)"
      - "traefik.http.routers.open-webui.tls=true"
      # - "traefik.http.routers.open-webui.tls.certresolver=letsencrypt"
      # - "traefik.http.routers.open-webui.tls.domains[0].main=${OPEN_WEBUI_HOST}"
      - "traefik.http.routers.open-webui.service=open-webui"
      # Services
      - "traefik.http.services.open-webui.loadbalancer.server.port=8080"
    logging:
      driver: json-file
      options:
        max-file: 5
        max-size: 10m
    networks:
      proxy-net:
        ipv4_address: ${OPEN_WEBUI_IP}
      ai-net:
        ipv4_address: ${OPEN_WEBUI_AI_IP}
    ports:
      - 8080
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - /opt/persistence/open-webui:/app/backend/data

networks:
  proxy-net:
    external: true
    name: traefik-net
  ai-net:
    external: true
    name: ai-net
